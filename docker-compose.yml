services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskapi
      POSTGRES_USER: taskapi
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskapi"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://taskapi:secret@db:5432/taskapi?sslmode=disable
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
